<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Trend India</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#000;
color:white;
}
header{
padding:80px 20px;
text-align:center;
background:linear-gradient(135deg,#ff7b00,#ffb700);
color:black;
}
header h1{
font-size:52px;
margin:0;
}
header p{
font-size:20px;
margin-top:10px;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px 20px;
}
.card{
background:#111;
border:1px solid #333;
border-radius:20px;
overflow:hidden;
}
.card img{
width:100%;
height:280px;
object-fit:cover;
}
.card h2{
padding:20px;
margin:0;
}
footer{
text-align:center;
padding:30px;
border-top:1px solid #222;
color:#aaa;
}
button{
background:#ff9d00;
border:none;
padding:12px 24px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<header>
<h1>Urban Trend India</h1>
<p>Premium Streetwear & Accessories</p>
<button>Explore Collection</button>
</header>

<section class="products">
<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200&auto=format&fit=crop">
<h2>Oversized Fashion</h2>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=1200&auto=format&fit=crop">
<h2>Street Accessories</h2>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1200&auto=format&fit=crop">
<h2>Urban Collection</h2>
</div>
</section>

<footer>
© 2026 Urban Trend India
</footer>

</body>
</html>
